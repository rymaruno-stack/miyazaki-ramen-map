<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新店を登録する｜宮崎ラーメンマップ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ヘッダー（index.htmlと統一） -->
  <header class="bg-red-600 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <img src="images/logo.png" alt="宮崎ラーメンマップ" class="h-10 w-10 object-contain" />
        <h1 class="text-xl font-bold tracking-wide">宮崎ラーメンマップ</h1>
      </a>
      <a href="index.html"
        class="text-sm bg-white text-red-600 font-bold px-3 py-1 rounded-full hover:bg-red-50 transition-colors">
        ← 地図に戻る
      </a>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-lg mx-auto px-4 py-8">

    <!-- タイトル -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-800">新しいお店を登録する</h2>
      <p class="text-sm text-gray-500 mt-1">宮崎のラーメン情報をみんなでシェアしよう！</p>
    </div>

    <!-- フォームカード -->
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">

      <form id="submit-form" novalidate>

        <!-- 店名 -->
        <div class="mb-5">
          <label for="name" class="block text-sm font-bold text-gray-700 mb-1">
            店名 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="例：麺屋 日向灘"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
          <p id="name-error" class="text-red-500 text-xs mt-1 hidden">店名を入力してください</p>
        </div>

        <!-- 住所 -->
        <div class="mb-5">
          <label for="address" class="block text-sm font-bold text-gray-700 mb-1">
            住所 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="例：宮崎市橘通西3丁目5-12"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
          <p id="address-error" class="text-red-500 text-xs mt-1 hidden">住所を入力してください</p>
        </div>

        <!-- 営業時間 -->
        <div class="mb-5">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-bold text-gray-700">営業時間</label>
            <div class="flex gap-2">
              <button type="button" id="copy-weekday"
                class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-3 py-1 rounded-full transition">
                月〜金にコピー
              </button>
              <button type="button" id="copy-sat-to-sun"
                class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-3 py-1 rounded-full transition">
                土→日にコピー
              </button>
            </div>
          </div>
          <div class="border border-gray-200 rounded-xl overflow-hidden divide-y divide-gray-100">

            <!-- 月 -->
            <div class="day-row bg-white" data-day="mon">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-gray-700 w-5 shrink-0">月</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 火 -->
            <div class="day-row bg-white" data-day="tue">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-gray-700 w-5 shrink-0">火</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 水 -->
            <div class="day-row bg-white" data-day="wed">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-gray-700 w-5 shrink-0">水</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 木 -->
            <div class="day-row bg-white" data-day="thu">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-gray-700 w-5 shrink-0">木</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 金 -->
            <div class="day-row bg-white" data-day="fri">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-gray-700 w-5 shrink-0">金</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 土 -->
            <div class="day-row bg-red-50/40" data-day="sat">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-orange-500 w-5 shrink-0">土</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- 日 -->
            <div class="day-row bg-red-50/40" data-day="sun">
              <div class="flex items-center gap-2 px-3 py-2">
                <span class="text-sm font-bold text-red-500 w-5 shrink-0">日</span>
                <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                  <input type="checkbox" class="day-closed w-4 h-4 rounded border-gray-300 cursor-pointer" />
                  <span class="text-xs text-gray-500">定休</span>
                </label>
                <div class="day-times flex items-center gap-1">
                  <input type="time" class="day-open w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                  <span class="text-xs text-gray-400">〜</span>
                  <input type="time" class="day-close w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                </div>
              </div>
              <div class="day-lo-row flex items-center gap-1.5 pl-20 pb-2">
                <span class="text-xs text-gray-400 w-5">LO</span>
                <input type="time" class="day-lo w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

          </div>
        </div>

        <!-- 朝ラーメン・ランチ -->
        <div class="mb-5">
          <label class="text-sm font-bold text-gray-700 block mb-2">朝ラーメン・ランチ</label>
          <div class="border border-gray-200 rounded-xl overflow-hidden divide-y divide-gray-100">

            <!-- 朝ラーメン -->
            <div class="bg-white px-3 py-2.5 flex items-center gap-2 flex-wrap">
              <span class="text-sm font-bold text-gray-700 shrink-0 w-24">🌅 朝ラーメン</span>
              <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                <input type="checkbox" id="morning-available" class="w-4 h-4 rounded border-gray-300 cursor-pointer" />
                <span class="text-xs text-gray-500">あり</span>
              </label>
              <div id="morning-times" class="flex items-center gap-1 opacity-30 pointer-events-none">
                <input type="time" id="morning-open" class="w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                <span class="text-xs text-gray-400">〜</span>
                <input type="time" id="morning-close" class="w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

            <!-- ランチ -->
            <div class="bg-white px-3 py-2.5 flex items-center gap-2 flex-wrap">
              <span class="text-sm font-bold text-gray-700 shrink-0 w-24">🍱 ランチ</span>
              <label class="flex items-center gap-1.5 cursor-pointer shrink-0">
                <input type="checkbox" id="lunch-available" class="w-4 h-4 rounded border-gray-300 cursor-pointer" />
                <span class="text-xs text-gray-500">あり</span>
              </label>
              <div id="lunch-times" class="flex items-center gap-1 opacity-30 pointer-events-none">
                <input type="time" id="lunch-open" class="w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
                <span class="text-xs text-gray-400">〜</span>
                <input type="time" id="lunch-close" class="w-[74px] text-xs border border-gray-200 rounded-lg px-1.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-red-400" />
              </div>
            </div>

          </div>
        </div>

        <!-- 備考 -->
        <div class="mb-5">
          <label for="note" class="block text-sm font-bold text-gray-700 mb-1">
            備考
          </label>
          <textarea
            id="note"
            name="note"
            placeholder="例：第一月曜定休、祝日休み、不定休あり など"
            rows="2"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition resize-none"
          ></textarea>
        </div>

        <!-- Instagram URL -->
        <div class="mb-5">
          <label for="instagram_url" class="block text-sm font-bold text-gray-700 mb-1">
            Instagram URL
          </label>
          <input
            type="url"
            id="instagram_url"
            name="instagram_url"
            placeholder="https://www.instagram.com/○○○"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
        </div>

        <!-- 電話番号 -->
        <div class="mb-5">
          <label for="phone" class="block text-sm font-bold text-gray-700 mb-1">
            電話番号
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="例：0985-00-0000"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
        </div>

        <!-- 新店チェックボックス -->
        <div class="mb-6">
          <label class="flex items-center gap-3 cursor-pointer select-none">
            <input
              type="checkbox"
              id="is_new"
              name="is_new"
              class="w-5 h-5 rounded border-gray-300 text-green-500 focus:ring-green-400 cursor-pointer"
            />
            <span class="text-sm font-bold text-gray-700">
              新店（オープンから3ヶ月以内）
              <span class="inline-block bg-green-500 text-white text-xs font-bold px-2 py-0.5 rounded ml-1">NEW</span>
              バッジを表示します
            </span>
          </label>
        </div>

        <!-- ジオコーディングエラー -->
        <p id="geo-error" class="hidden text-red-500 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-2.5 mb-4"></p>

        <!-- 送信ボタン -->
        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 rounded-xl text-sm transition-colors shadow-sm"
        >
          登録する
        </button>

      </form>

      <!-- 送信完了メッセージ（初期は非表示） -->
      <div id="success-message" class="hidden text-center py-4">
        <div class="text-4xl mb-3">🎉</div>
        <p class="text-lg font-bold text-gray-800">ありがとうございました！</p>
        <p class="text-sm text-gray-500 mt-1">お店の情報を受け付けました。</p>
        <p class="text-sm text-gray-500 mt-1">内容確認後、掲載いたします。</p>
        <a href="index.html"
          class="inline-block mt-5 bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-colors">
          地図に戻る
        </a>
      </div>

    </div>

    <!-- 注意書き -->
    <p class="text-xs text-gray-400 text-center mt-4">
      ※ 投稿内容は確認後に掲載されます。不適切な情報は削除する場合があります。
    </p>

  </main>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- アプリJS -->
  <script src="js/config.js"></script>
  <script src="js/submit.js"></script>

</body>
</html>
