<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新店を登録する｜宮崎ラーメンマップ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ヘッダー（index.htmlと統一） -->
  <header class="bg-red-600 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <img src="images/logo.png" alt="宮崎ラーメンマップ" class="h-10 w-10 object-contain" />
        <h1 class="text-xl font-bold tracking-wide">宮崎ラーメンマップ</h1>
      </a>
      <a href="index.html"
        class="text-sm bg-white text-red-600 font-bold px-3 py-1 rounded-full hover:bg-red-50 transition-colors">
        ← 地図に戻る
      </a>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-lg mx-auto px-4 py-8">

    <!-- タイトル -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-800">新しいお店を登録する</h2>
      <p class="text-sm text-gray-500 mt-1">宮崎のラーメン情報をみんなでシェアしよう！</p>
    </div>

    <!-- フォームカード -->
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">

      <form id="submit-form" novalidate>

        <!-- 店名 -->
        <div class="mb-5">
          <label for="name" class="block text-sm font-bold text-gray-700 mb-1">
            店名 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="例：麺屋 日向灘"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
          <p id="name-error" class="text-red-500 text-xs mt-1 hidden">店名を入力してください</p>
        </div>

        <!-- 住所 -->
        <div class="mb-5">
          <label for="address" class="block text-sm font-bold text-gray-700 mb-1">
            住所 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="例：宮崎市橘通西3丁目5-12"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
          <p id="address-error" class="text-red-500 text-xs mt-1 hidden">住所を入力してください</p>
        </div>

        <!-- 営業時間 -->
        <div class="mb-5">
          <label for="hours" class="block text-sm font-bold text-gray-700 mb-1">
            営業時間
          </label>
          <input
            type="text"
            id="hours"
            name="hours"
            placeholder="例：11:00〜22:00（火曜定休）"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
        </div>

        <!-- Instagram URL -->
        <div class="mb-5">
          <label for="instagram_url" class="block text-sm font-bold text-gray-700 mb-1">
            Instagram URL
          </label>
          <input
            type="url"
            id="instagram_url"
            name="instagram_url"
            placeholder="https://www.instagram.com/○○○"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
        </div>

        <!-- 電話番号 -->
        <div class="mb-5">
          <label for="phone" class="block text-sm font-bold text-gray-700 mb-1">
            電話番号
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="例：0985-00-0000"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
          />
        </div>

        <!-- 新店チェックボックス -->
        <div class="mb-6">
          <label class="flex items-center gap-3 cursor-pointer select-none">
            <input
              type="checkbox"
              id="is_new"
              name="is_new"
              class="w-5 h-5 rounded border-gray-300 text-green-500 focus:ring-green-400 cursor-pointer"
            />
            <span class="text-sm font-bold text-gray-700">
              新店（オープンから3ヶ月以内）
              <span class="inline-block bg-green-500 text-white text-xs font-bold px-2 py-0.5 rounded ml-1">NEW</span>
              バッジを表示します
            </span>
          </label>
        </div>

        <!-- ジオコーディングエラー -->
        <p id="geo-error" class="hidden text-red-500 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-2.5 mb-4"></p>

        <!-- 送信ボタン -->
        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 rounded-xl text-sm transition-colors shadow-sm"
        >
          登録する
        </button>

      </form>

      <!-- 送信完了メッセージ（初期は非表示） -->
      <div id="success-message" class="hidden text-center py-4">
        <div class="text-4xl mb-3">🎉</div>
        <p class="text-lg font-bold text-gray-800">ありがとうございました！</p>
        <p class="text-sm text-gray-500 mt-1">お店の情報を受け付けました。</p>
        <a href="index.html"
          class="inline-block mt-5 bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-colors">
          地図に戻る
        </a>
      </div>

    </div>

    <!-- 注意書き -->
    <p class="text-xs text-gray-400 text-center mt-4">
      ※ 投稿内容は確認後に掲載されます。不適切な情報は削除する場合があります。
    </p>

  </main>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- アプリJS -->
  <script src="js/config.js"></script>
  <script src="js/submit.js"></script>

</body>
</html>
