<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | 宮崎ラーメンマップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-red-600 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <img src="images/logo.png" alt="宮崎ラーメンマップ" class="h-10 w-10 object-contain">
        <span class="text-xl font-bold tracking-wide">宮崎ラーメンマップ</span>
      </a>
      <span class="text-sm bg-red-700 px-3 py-1 rounded-full font-bold">管理画面</span>
    </div>
  </header>

  <div id="auth-screen" class="max-w-sm mx-auto px-4 py-20">
    <div class="bg-white rounded-2xl shadow-md p-8 text-center">
      <p class="text-3xl mb-4">&#128274;</p>
      <h2 class="text-lg font-bold text-gray-800 mb-5">管理者ログイン</h2>
      <input
        id="pw-input"
        type="password"
        placeholder="パスワード"
        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-center mb-3 focus:outline-none focus:ring-2 focus:ring-red-400"
      >
      <p id="pw-error" class="text-red-500 text-xs mb-3 hidden">パスワードが違います</p>
      <button
        id="login-btn"
        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl text-sm"
      >ログイン</button>
    </div>
  </div>

  <main id="main-screen" class="hidden max-w-3xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-gray-800">承認待ち店舗</h2>
      <span id="count-badge" class="text-sm bg-yellow-100 text-yellow-700 font-bold px-3 py-1 rounded-full">0件</span>
    </div>
    <p id="loading-text" class="text-gray-400 text-sm">読み込み中...</p>
    <p id="error-text" class="hidden text-red-500 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-3"></p>
    <div id="shop-list" class="space-y-4"></div>
    <p id="empty-text" class="hidden text-center text-gray-500 py-16 font-bold">承認待ちの店舗はありません</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
